# docker-compose для Toymarket — локальный запуск/тест деплоя.
# На VPS: docker compose up -d --build
services:
  toymarket-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Бэкенд. Можно переопределить: --build-arg NEXT_PUBLIC_API_URL=...
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.toymarket.site}
    container_name: toymarket-frontend
    ports:
      - "3000:3000"
    # NEXT_PUBLIC_* вшивается на этапе сборки, поэтому runtime-env здесь только
    # для служебных переменных (порт и т.п.).
    environment:
      - NODE_ENV=production
    restart: unless-stopped
